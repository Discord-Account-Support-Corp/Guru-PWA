<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guru Workspace</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0066FF">

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0066FF 0%, #004BB3 100%);
}

.container {
    text-align: center;
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    max-width: 400px;
}

h1 {
    color: #0066FF;
    margin: 0 0 10px 0;
}

p {
    color: #666;
    margin: 10px 0 30px 0;
}

button {
    background-color: #0066FF;
    color: white;
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.3s;
}

button:hover {
    background-color: #004BB3;
}

.hidden {
    display: none;
}

.loader {
    border: 4px solid rgba(0, 102, 255, 0.1);
    border-top: 4px solid #0066FF;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

</style>

</head>

<body>

<div class="container">
<div id="loading" class="loader"></div>
<div id="content" class="hidden">
    <h1>Guru Workspace</h1>
    <p>Ready to open your workspace?</p>
    <button onclick="openWorkspace()">Launch Workspace</button>
</div>
</div>


<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("./sw.js");

}

// Show content after page fully loads
window.addEventListener('load', function() {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');
});

function openWorkspace() {

    window.location.href =
    "https://app.getguru.com/page/a4b08056-0ad1-4cd5-97c9-798bfa01f7d2";

}

</script>

</body>

</html>
