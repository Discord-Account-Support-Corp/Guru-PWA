<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guru Workspace</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0066FF">

</head>

<body>

<p>Guru Workspace PWA</p>

<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("./sw.js");

}


// Only redirect after the PWA has already been opened once
const installedBefore =
localStorage.getItem("guru-installed");


if (installedBefore === "yes") {

    window.location.replace(
        "https://app.getguru.com/page/a4b08056-0ad1-4cd5-97c9-798bfa01f7d2"
    );

}


// Mark as ready only when running from Home Screen
const standalone =
window.matchMedia("(display-mode: standalone)").matches ||
window.navigator.standalone === true;


if (standalone) {

    localStorage.setItem(
        "guru-installed",
        "yes"
    );

}

</script>

</body>

</html>
