<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guru Workspace</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0066FF">

</head>

<body>

<p>Guru Workspace PWA is ready to install.</p>


<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("./sw.js");

}


const isInstalled =
window.matchMedia("(display-mode: standalone)").matches ||
window.navigator.standalone === true;


const hasLaunched =
localStorage.getItem("guru-workspace-launch");


if (isInstalled && hasLaunched) {

    window.location.replace(
        "https://app.getguru.com/page/a4b08056-0ad1-4cd5-97c9-798bfa01f7d2"
    );

}


// First installed launch
if (isInstalled && !hasLaunched) {

    localStorage.setItem(
        "guru-workspace-launch",
        "true"
    );

}

</script>

</body>

</html>
